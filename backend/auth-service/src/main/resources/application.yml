server:
  port: 8081

spring:
  application:
    name: auth-service

  datasource:
    url: jdbc:postgresql://localhost:55433/authdb
    username: devx
    password: devx

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# ========================
# JWT
# ========================
jwt:
  secret: devx-super-secret-key-very-secure-123456
  expiration-ms: 36000000

# ========================
# CORS
# ========================
cors:
  allowed-origins:
    - http://localhost:4200
    # - https://seudominio.com.br  # produção

# ========================
# UPLOAD
# ========================
app:
  upload:
    base-url: http://localhost:8081