<header class="topbar">
  <span class="topbar-title">{{ (pageTitle$ | async) ?? 'Dashboard' }}</span>

  <div class="topbar-actions">

    <!-- Notificações -->
    <app-notifications />

    <!-- Logout -->
    <button class="topbar-btn" title="Sair" (click)="logout()">
      <svg viewBox="0 0 16 16" fill="none">
        <path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M10 11l3-3-3-3" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M13 8H6" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>

  </div>
</header>
