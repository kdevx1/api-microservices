@if (visible) {
  <div class="overlay" (click)="close()">
    <div class="modal" (click)="$event.stopPropagation()">

      <div class="modal-header">
        <div>
          <div class="modal-title">Nova Ordem de Serviço</div>
          <div class="modal-sub">Preencha os dados da ordem</div>
        </div>
        <button class="close-btn" (click)="close()">
          <svg viewBox="0 0 14 14" fill="none">
            <path d="M1 1l12 12M13 1L1 13" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div class="modal-body">
        <form [formGroup]="form">

          <div class="field">
            <label>Serviço</label>
            <select formControlName="serviceId" [class.invalid]="serviceId.invalid && serviceId.touched">
              <option [value]="null" disabled>Selecione o serviço...</option>
              @for (s of services(); track s.id) {
                <option [value]="s.id">{{ s.name }} — {{ s.categoryName }}</option>
              }
            </select>
            @if (serviceId.invalid && serviceId.touched) {
              <small class="field-error">Serviço obrigatório</small>
            }
          </div>

          <div class="field">
            <label>Cliente</label>
            <select formControlName="clientId" [class.invalid]="clientId.invalid && clientId.touched">
              <option [value]="null" disabled>Selecione o cliente...</option>
              @for (u of users(); track u.id) {
                <option [value]="u.id">{{ u.name }} — {{ u.email }}</option>
              }
            </select>
            @if (clientId.invalid && clientId.touched) {
              <small class="field-error">Cliente obrigatório</small>
            }
          </div>

          <div class="field">
            <label>Data e hora <span class="optional">(opcional)</span></label>
            <input type="datetime-local" formControlName="scheduledAt" />
          </div>

          <div class="field">
            <label>Observações <span class="optional">(opcional)</span></label>
            <textarea formControlName="notes" placeholder="Informações adicionais..." rows="3"></textarea>
          </div>

        </form>
      </div>

      <div class="modal-footer">
        <button class="btn btn-cancel" (click)="close()">Cancelar</button>
        <button class="btn btn-save" (click)="onSubmit()" [disabled]="loading">
          @if (loading) { <span class="btn-spinner"></span> }
          @else { Criar Ordem }
        </button>
      </div>

    </div>
  </div>
}
