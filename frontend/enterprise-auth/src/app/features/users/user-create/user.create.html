<mat-form-field>
  <input matInput formControlName="name" placeholder="Nome">
</mat-form-field>

<mat-form-field>
  <input matInput formControlName="email" placeholder="Email">
</mat-form-field>

<mat-form-field>
  <input matInput type="password" formControlName="password" placeholder="Senha">
</mat-form-field>

<mat-form-field>
  <mat-select formControlName="role">
    <mat-option value="ROLE_USER">User</mat-option>
    <mat-option value="ROLE_ADMIN">Admin</mat-option>
  </mat-select>
</mat-form-field>

<button mat-raised-button color="primary">Salvar</button>

</form>
